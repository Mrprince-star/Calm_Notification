<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaithfulBiz Apps</title>
<meta name="description" content="Apps built by FaithfulBiz — starting with Calm Notifications, an Android app for reducing notification overload.">
<link rel="canonical" href="https://app.faithfulbiz.com.ng/">
<meta property="og:site_name" content="FaithfulBiz">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #5B7FDE;
    --accent: #4CAF82;
    --bg: #F7F7FB;
    --text: #1A1A2E;
    --muted: #6B7280;
    --card-border: #E5E7EB;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
  header { text-align: center; padding: 56px 0 32px; }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); margin: 0; }
  main { padding-bottom: 80px; }
  .app-card {
    display: flex;
    gap: 18px;
    align-items: center;
    background: white;
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 24px;
    text-decoration: none;
    color: inherit;
    margin-bottom: 16px;
  }
  .app-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--brand);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .app-info h2 {
    font-family: 'Fraunces', serif;
    margin: 0 0 4px;
    font-size: 18px;
  }
  .app-info p { margin: 0; color: var(--muted); font-size: 14px; }
  .coming-soon {
    border: 1px dashed var(--card-border);
    border-radius: 18px;
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 24px 0;
  }
  footer a { color: var(--brand); }
</style>
</head>
<body>

<header class="container">
  <h1>FaithfulBiz Apps</h1>
  <p>Simple, honest software — built one problem at a time.</p>
</header>

<main class="container">

  <a href="calm-notifications/index.html" class="app-card">
    <div class="app-icon">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="38" rx="20" ry="17" fill="white"/>
        <polygon points="32,45 68,45 76,66 24,66" fill="white"/>
        <rect x="20" y="64" width="60" height="6" rx="3" fill="white"/>
        <ellipse cx="50" cy="79" rx="6" ry="6" fill="white"/>
        <line x1="18" y1="80" x2="82" y2="18" stroke="#5B7FDE" stroke-width="13"/>
        <line x1="18" y1="80" x2="82" y2="18" stroke="white" stroke-width="7"/>
      </svg>
    </div>
    <div class="app-info">
      <h2>Calm Notifications</h2>
      <p>Batch non-essential Android notifications into quiet daily summaries. Free, private, works offline.</p>
    </div>
  </a>

  <div class="coming-soon">
    More apps coming soon.
  </div>

</main>

<footer>
  <div class="container">
    <p>&copy; <span id="year"></span> FaithfulBiz. All rights reserved. · <a href="mailto:faithfulbizteam@gmail.com">Contact</a></p>
  </div>
</footer>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>
</html>
